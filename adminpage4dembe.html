<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demble Landsites · Admin</title>
    <!-- favicon: dembe.png (direct) -->
    <link rel="icon" type="image/png" href="dembe.png">
    <!-- Font Awesome 6 & Google Fonts (Inter) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000; /* pure black */
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            min-height: 100vh;
            padding: 20px;
        }

        :root {
            --pure-black: #000000;
            --rich-black: #1E1E1E;
            --pure-gold: #D4AF37;
            --whatsapp-green: #25D366;
            --white: #FFFFFF;
            --light-gray: #F5F5F5;
            --dark-gray: #111111;
            --medium-gray: #2A2A2A;
            --shadow: 0 10px 25px rgba(0,0,0,0.5);
            --accent: #D4AF37; /* gold */
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* header */
        .site-header {
            background: var(--pure-black);
            padding: 0.6rem 1.5rem;
            border-bottom: 3px solid var(--pure-gold);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border-radius: 0 0 20px 20px;
            margin-bottom: 30px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .logo-img {
            height: 45px;
            width: auto;
            display: block;
            border: none;
            background: white; /* optional for png with transparency */
            border-radius: 8px;
        }
        .brand-text {
            color: var(--white);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .brand-text .gold {
            color: var(--pure-gold);
        }

        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 1rem;
            font-weight: 400;
        }

        /* tabs */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 30px;
            background: var(--dark-gray);
            border-radius: 50px;
            padding: 8px;
            border: 1px solid var(--pure-gold);
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 12px 25px;
            background: transparent;
            color: rgba(255,255,255,0.7);
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            flex: 1 1 auto;
            font-size: 1rem;
            border: 1px solid transparent;
        }
        .tab-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            color: var(--pure-gold);
        }
        .tab-btn.active {
            background: var(--pure-gold);
            color: var(--pure-black);
            box-shadow: 0 2px 10px rgba(212,175,55,0.5);
            border-color: var(--pure-gold);
        }

        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* cards */
        .admin-card {
            background: var(--dark-gray);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid var(--pure-gold);
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
            margin-bottom: 30px;
            border-top: 5px solid var(--pure-gold);
        }
        h2 {
            color: var(--white);
            margin-bottom: 25px;
            font-weight: 600;
            border-bottom: 1px solid var(--medium-gray);
            padding-bottom: 15px;
        }
        h2 i {
            color: var(--pure-gold);
            margin-right: 10px;
        }

        /* form */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.9);
            font-weight: 500;
        }
        .required::after {
            content: " *";
            color: var(--pure-gold);
        }
        input, textarea, select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--medium-gray);
            border-radius: 16px;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: border 0.2s;
        }
        input:focus, textarea:focus, select:focus {
            border-color: var(--pure-gold);
            outline: none;
        }
        input::placeholder, textarea::placeholder {
            color: rgba(255,255,255,0.3);
        }
        select option {
            background: var(--dark-gray);
            color: white;
        }

        /* row for width/length */
        .row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .row .form-group {
            flex: 1 1 200px;
        }

        /* buttons */
        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 2px solid transparent;
        }
        .btn-gold {
            background: var(--pure-gold);
            color: var(--pure-black);
        }
        .btn-gold:hover {
            background: #b5942e;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(212,175,55,0.3);
        }
        .btn-danger {
            background: #b30000;
            color: white;
        }
        .btn-danger:hover {
            background: #8b0000;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* preview images */
        #preview, #sketchPreview {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 20px;
            border: 2px solid var(--pure-gold);
            margin-bottom: 15px;
            background: #222;
            display: none;
        }

        /* products grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        .product-card {
            background: var(--dark-gray);
            border-radius: 25px;
            overflow: hidden;
            border: 1px solid var(--pure-gold);
            transition: 0.3s;
        }
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(212,175,55,0.2);
        }
        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 2px solid var(--pure-gold);
        }
        .product-info {
            padding: 20px;
        }
        .product-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--pure-gold);
            margin-bottom: 8px;
        }
        .product-price {
            font-size: 1.2rem;
            font-weight: 600;
            background: rgba(212,175,55,0.15);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 40px;
            border: 1px solid var(--pure-gold);
            margin-bottom: 10px;
        }
        .product-category {
            display: inline-block;
            background: var(--pure-black);
            color: var(--pure-gold);
            padding: 5px 15px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 12px;
            border: 1px solid var(--pure-gold);
        }
        .product-details {
            color: rgba(255,255,255,0.8);
            font-size: 0.95rem;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        .product-details i {
            color: var(--pure-gold);
            width: 20px;
            margin-right: 6px;
        }
        .product-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .product-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        /* stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--dark-gray);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--pure-gold);
        }
        .stat-number {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--pure-gold);
            line-height: 1.2;
        }
        .stat-label {
            color: rgba(255,255,255,0.7);
        }

        .category-badge {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(212,175,55,0.08);
            border-radius: 50px;
            margin-bottom: 10px;
            border: 1px solid var(--pure-gold);
        }

        /* messages */
        .message {
            padding: 15px 20px;
            border-radius: 50px;
            margin-bottom: 20px;
            border-left: 6px solid;
            animation: slideIn 0.3s;
            font-weight: 500;
        }
        .message.success {
            background: rgba(212,175,55,0.2);
            color: #d4af37;
            border-left-color: #d4af37;
        }
        .message.error {
            background: rgba(179,0,0,0.2);
            color: #ff6666;
            border-left-color: #b30000;
        }
        .message.info {
            background: rgba(33,150,243,0.2);
            color: #4fc3ff;
            border-left-color: #2196f3;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(212,175,55,0.2);
            border-top-color: var(--pure-gold);
            border-radius: 50%;
            animation: spin 1s infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .no-products {
            text-align: center;
            padding: 60px 20px;
            background: var(--dark-gray);
            border-radius: 30px;
            border: 1px dashed var(--pure-gold);
        }
        .no-products i {
            font-size: 3rem;
            color: var(--pure-gold);
            margin-bottom: 15px;
        }

        /* back link */
        .back-link {
            text-align: center;
            margin: 40px 0 20px;
        }
        .back-link a {
            color: var(--pure-gold);
            text-decoration: none;
            font-size: 1.1rem;
            border: 2px solid var(--pure-gold);
            padding: 12px 30px;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }
        .back-link a:hover {
            background: var(--pure-gold);
            color: var(--pure-black);
        }

        /* responsive */
        @media (max-width: 600px) {
            .site-header {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
            .tabs {
                flex-direction: column;
                border-radius: 30px;
            }
            .admin-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- header with dembe logo -->
        <header class="site-header">
            <div class="logo-area">
                <img src="dembe.png" alt="Demble Landsites" class="logo-img">
                <span class="brand-text">DEMBLE<span class="gold">.LAND</span></span>
            </div>
            <div class="subtitle">
                <i class="fas fa-crown" style="color: #D4AF37;"></i> admin panel · land management
            </div>
        </header>

        <!-- tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="upload"><i class="fas fa-cloud-upload-alt"></i> Upload Land</button>
            <button class="tab-btn" data-tab="manage"><i class="fas fa-map-marked-alt"></i> Manage Lands</button>
            <button class="tab-btn" data-tab="stats"><i class="fas fa-chart-pie"></i> Statistics</button>
        </div>

        <!-- messages container -->
        <div id="messages-container"></div>

        <!-- ========== UPLOAD TAB ========== -->
        <div id="upload-tab" class="tab-content active">
            <div class="admin-card">
                <h2><i class="fas fa-upload"></i> Add new land</h2>

                <!-- main image -->
                <div class="form-group">
                    <label for="file-picker" class="required">Land Image</label>
                    <input type="file" id="file-picker" accept="image/*">
                </div>
                <img id="preview" src="#" alt="preview">

                <!-- title -->
                <div class="form-group">
                    <label for="land-title" class="required">Land Title / Plot name</label>
                    <input type="text" id="land-title" placeholder="e.g., Prime plot in Nakifuma">
                </div>

                <!-- price -->
                <div class="form-group">
                    <label for="land-price" class="required">Price (UGX)</label>
                    <input type="number" id="land-price" placeholder="e.g., 1500000" min="0">
                </div>

                <!-- category row: dropdown + custom -->
                <div class="form-group">
                    <label for="land-category">Category (select or write your own below)</label>
                    <select id="land-category">
                        <option value="">-- Select category --</option>
                        <option value="Nakifuma">Nakifuma</option>
                        <option value="Mayanganga">Mayanganga</option>
                        <option value="Kawongo">Kawongo</option>
                        <option value="Kimenyedde">Kimenyedde</option>
                        <option value="Kalagi Kawuku">Kalagi Kawuku</option>
                        <option value="Nakibano">Nakibano</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="custom-category">Or enter custom category (if blank, selection above is used)</label>
                    <input type="text" id="custom-category" placeholder="e.g., New zone">
                </div>

                <!-- width & length row -->
                <div class="row">
                    <div class="form-group">
                        <label for="land-width">Width (meters / optional)</label>
                        <input type="number" id="land-width" placeholder="e.g., 30" step="0.01">
                    </div>
                    <div class="form-group">
                        <label for="land-length">Length (meters / optional)</label>
                        <input type="number" id="land-length" placeholder="e.g., 50" step="0.01">
                    </div>
                </div>

                <!-- sketch image (optional) -->
                <div class="form-group">
                    <label for="sketch-picker">Sketch / Map drawing (optional)</label>
                    <input type="file" id="sketch-picker" accept="image/*">
                </div>
                <img id="sketchPreview" src="#" alt="sketch preview">

                <!-- google map link -->
                <div class="form-group">
                    <label for="map-link">Google Maps link / coordinates (optional)</label>
                    <input type="url" id="map-link" placeholder="https://maps.app.goo.gl/... or lat,lng">
                </div>

                <!-- description -->
                <div class="form-group">
                    <label for="land-desc">Description / notes (optional)</label>
                    <textarea id="land-desc" rows="3" placeholder="Any details about the land..."></textarea>
                </div>

                <button class="btn btn-gold" id="submit-btn">
                    <i class="fas fa-cloud-upload-alt"></i> UPLOAD LAND
                </button>
                <p id="status" style="margin-top: 15px; text-align: center;"></p>
            </div>
        </div>

        <!-- ========== MANAGE TAB ========== -->
        <div id="manage-tab" class="tab-content">
            <div class="admin-card">
                <h2><i class="fas fa-cogs"></i> Manage land listings</h2>
                <div id="products-container">
                    <div class="loading" id="loading-products">
                        <div class="loading-spinner"></div>
                        <p>Loading lands...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========== STATISTICS TAB ========== -->
        <div id="stats-tab" class="tab-content">
            <div class="admin-card">
                <h2><i class="fas fa-chart-bar"></i> Land statistics</h2>
                <div class="stats-grid" id="stats-container">
                    <div class="loading" id="loading-stats">
                        <div class="loading-spinner"></div>
                        <p>Loading stats...</p>
                    </div>
                </div>
                <div id="category-stats"></div>
            </div>
        </div>

        <!-- back to gallery (index.html) -->
        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Dembe Gallery (index.html)</a>
        </div>
    </div>

    <script type="module">
        // ==================== FIREBASE INIT (your config) ====================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            getDocs, 
            deleteDoc, 
            doc,
            query,
            orderBy 
        } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        // Firebase config (provided)
        const firebaseConfig = {
            apiKey: "AIzaSyCXxG2nN3m9Y66XFZ6bwZ9h5HU0Ge5_NeY",
            authDomain: "dembe-249a0.firebaseapp.com",
            projectId: "dembe-249a0",
            storageBucket: "dembe-249a0.firebasestorage.app",
            messagingSenderId: "1091754769869",
            appId: "1:1091754769869:web:a08e0981e5ae3762511884",
            measurementId: "G-44EK6PF0KC"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);
        console.log("🔥 Firestore ready (Dembe)");

        // Cloudinary config
        const CLOUD_NAME = "dopuutcka";        // same as HTML2, keep as is
        const UPLOAD_PRESET = "anubis_dembe";  // as instructed

        // DOM elements
        const filePicker = document.getElementById('file-picker');
        const preview = document.getElementById('preview');
        const sketchPicker = document.getElementById('sketch-picker');
        const sketchPreview = document.getElementById('sketchPreview');
        const submitBtn = document.getElementById('submit-btn');
        const statusEl = document.getElementById('status');
        const productsContainer = document.getElementById('products-container');
        const statsContainer = document.getElementById('stats-container');
        const categoryStats = document.getElementById('category-stats');
        const messagesContainer = document.getElementById('messages-container');

        // Predefined categories (for stats & dropdown)
        const dembeCategories = [
            "Nakifuma", "Mayanganga", "Kawongo", "Kimenyedde", "Kalagi Kawuku", "Nakibano"
        ];

        // ========== helpers ==========
        function showMessage(type, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i> ${text}`;
            messagesContainer.appendChild(msgDiv);
            setTimeout(() => {
                msgDiv.style.opacity = '0';
                msgDiv.style.transition = 'opacity 0.5s';
                setTimeout(() => msgDiv.remove(), 500);
            }, 5000);
        }

        // image previews
        filePicker.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        });
        sketchPicker.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                sketchPreview.src = URL.createObjectURL(file);
                sketchPreview.style.display = 'block';
            } else {
                sketchPreview.style.display = 'none';
            }
        });

        // ========== TAB SWITCHING ==========
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.getAttribute('data-tab');
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                tabContents.forEach(c => c.classList.remove('active'));
                document.getElementById(`${tabId}-tab`).classList.add('active');
                
                if (tabId === 'manage') loadProducts();
                else if (tabId === 'stats') loadStatistics();
            });
        });

        // ========== UPLOAD LAND (with price check) ==========
        submitBtn.addEventListener('click', async () => {
            const mainFile = filePicker.files[0];
            const sketchFile = sketchPicker.files[0]; // optional
            const title = document.getElementById('land-title').value.trim();
            const price = document.getElementById('land-price').value.trim();
            const selectedCat = document.getElementById('land-category').value;
            const customCat = document.getElementById('custom-category').value.trim();
            const width = document.getElementById('land-width').value.trim();
            const length = document.getElementById('land-length').value.trim();
            const mapLink = document.getElementById('map-link').value.trim();
            const desc = document.getElementById('land-desc').value.trim();

            // validation
            if (!mainFile || !title || !price) {
                showMessage('error', 'Please provide image, title and price.');
                return;
            }
            // price < 1.5M check
            if (parseFloat(price) < 1500000) {
                if (!confirm('⚠️ Price is below 1.5M UGX. Are you sure you want to continue?')) {
                    return;
                }
            }

            // determine category
            let finalCategory = selectedCat;
            if (customCat !== '') {
                finalCategory = customCat;
            }
            if (!finalCategory) {
                showMessage('error', 'Please select or enter a category.');
                return;
            }

            statusEl.innerText = "📤 Uploading image(s) to Cloudinary...";
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> UPLOADING...';

            try {
                // 1. upload main image
                const mainUrl = await uploadToCloudinary(mainFile);
                let sketchUrl = null;
                if (sketchFile) {
                    sketchUrl = await uploadToCloudinary(sketchFile);
                }

                statusEl.innerText = "💾 Saving to Firestore...";

                // 2. Firestore document (must include admin_key for write rule)
                const landData = {
                    title: title,
                    price: price,
                    category: finalCategory,
                    width: width || null,
                    length: length || null,
                    mapLink: mapLink || null,
                    description: desc || '',
                    image: mainUrl,
                    sketchImage: sketchUrl || null,
                    createdAt: Date.now(),
                    admin_key: "dembe_pass=68"   // CRITICAL: matches Firestore rule
                };

                await addDoc(collection(db, "branding_products"), landData);

                showMessage('success', "✅ Land uploaded successfully!");
                
                // reset form
                document.getElementById('land-title').value = '';
                document.getElementById('land-price').value = '';
                document.getElementById('land-category').value = '';
                document.getElementById('custom-category').value = '';
                document.getElementById('land-width').value = '';
                document.getElementById('land-length').value = '';
                document.getElementById('map-link').value = '';
                document.getElementById('land-desc').value = '';
                filePicker.value = '';
                sketchPicker.value = '';
                preview.style.display = 'none';
                sketchPreview.style.display = 'none';
                statusEl.innerText = '✅ Done';

                // switch to manage tab
                tabBtns[1].click();

            } catch (error) {
                console.error('Upload error:', error);
                showMessage('error', '❌ Upload failed: ' + error.message);
                statusEl.innerText = '❌ Error';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> UPLOAD LAND';
            }
        });

        // Cloudinary upload function
        async function uploadToCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            const resp = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                method: 'POST',
                body: formData
            });
            if (!resp.ok) throw new Error(`Cloudinary error ${resp.status}`);
            const data = await resp.json();
            return data.secure_url;
        }

        // ========== LOAD PRODUCTS (manage tab) ==========
        async function loadProducts() {
            try {
                productsContainer.innerHTML = `<div class="loading"><div class="loading-spinner"></div><p>Loading lands...</p></div>`;
                const q = query(collection(db, "branding_products"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                
                if (snap.empty) {
                    productsContainer.innerHTML = `
                        <div class="no-products">
                            <i class="fas fa-map"></i>
                            <h3>No land listings yet</h3>
                            <p>Upload your first plot using the "Upload Land" tab.</p>
                        </div>
                    `;
                    return;
                }

                let html = '<div class="products-grid">';
                snap.forEach(docSnap => {
                    const p = docSnap.data();
                    const id = docSnap.id;
                    // format width/length if exist
                    const dimensions = (p.width && p.length) ? `${p.width}m x ${p.length}m` : (p.width ? `width: ${p.width}m` : (p.length ? `length: ${p.length}m` : '—'));
                    const mapIcon = p.mapLink ? `<i class="fas fa-map-marker-alt"></i> <a href="${p.mapLink}" target="_blank" style="color: #D4AF37;">map</a>` : '';
                    html += `
                        <div class="product-card" data-id="${id}">
                            <img src="${p.image}" alt="${p.title}" class="product-image">
                            <div class="product-info">
                                <div class="product-title">${p.title}</div>
                                <div class="product-price">UGX ${Number(p.price).toLocaleString()}</div>
                                <div><span class="product-category"><i class="fas fa-tag"></i> ${p.category}</span></div>
                                <div class="product-details">
                                    ${dimensions !== '—' ? `<i class="fas fa-ruler-combined"></i> ${dimensions}<br>` : ''}
                                    ${p.mapLink ? `<i class="fas fa-map-marked-alt"></i> ${mapIcon}<br>` : ''}
                                    ${p.description ? `<i class="fas fa-file-alt"></i> ${p.description.substring(0,60)}${p.description.length>60?'…':''}<br>` : ''}
                                    ${p.sketchImage ? `<i class="fas fa-pencil-ruler"></i> <a href="${p.sketchImage}" target="_blank" style="color:#D4AF37;">sketch</a>` : ''}
                                </div>
                                <div class="product-actions">
                                    <button class="btn-danger delete-btn" data-id="${id}" data-title="${p.title}">
                                        <i class="fas fa-trash"></i> Delete
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                productsContainer.innerHTML = html;

                // attach delete handlers
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const id = btn.getAttribute('data-id');
                        const title = btn.getAttribute('data-title');
                        if (confirm(`Delete "${title}" permanently?`)) {
                            btn.disabled = true;
                            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Deleting...';
                            try {
                                await deleteDoc(doc(db, "branding_products", id));
                                showMessage('success', `🗑️ Deleted: ${title}`);
                                loadProducts();  // refresh
                                loadStatistics();
                            } catch (err) {
                                showMessage('error', 'Delete failed: ' + err.message);
                                btn.disabled = false;
                                btn.innerHTML = '<i class="fas fa-trash"></i> Delete';
                            }
                        }
                    });
                });

            } catch (err) {
                console.error(err);
                productsContainer.innerHTML = `<div class="no-products"><i class="fas fa-exclamation-triangle"></i> Error: ${err.message}</div>`;
            }
        }

        // ========== LOAD STATISTICS ==========
        async function loadStatistics() {
            try {
                statsContainer.innerHTML = `<div class="loading"><div class="loading-spinner"></div><p>Loading stats...</p></div>`;
                categoryStats.innerHTML = '';
                const snap = await getDocs(collection(db, "branding_products"));
                const total = snap.size;
                
                // count categories
                const catCount = {};
                dembeCategories.forEach(c => catCount[c] = 0);
                let otherCount = 0;
                
                snap.forEach(d => {
                    const cat = d.data().category;
                    if (catCount.hasOwnProperty(cat)) catCount[cat]++;
                    else otherCount++;
                });

                const activeCats = Object.values(catCount).filter(v=>v>0).length + (otherCount>0?1:0);
                const maxInCat = Math.max(...Object.values(catCount), otherCount);

                statsContainer.innerHTML = `
                    <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">Total Lands</div></div>
                    <div class="stat-card"><div class="stat-number">${dembeCategories.length}</div><div class="stat-label">Base Categories</div></div>
                    <div class="stat-card"><div class="stat-number">${activeCats}</div><div class="stat-label">Active Categories</div></div>
                    <div class="stat-card"><div class="stat-number">${maxInCat}</div><div class="stat-label">Most in Category</div></div>
                `;

                // category breakdown
                let catHtml = '<div style="margin-top:30px;"><h3 style="border-bottom:1px solid #333; padding-bottom:10px;">📋 Category breakdown</h3>';
                for (let cat of dembeCategories) {
                    if (catCount[cat] > 0) {
                        catHtml += `<div class="category-badge"><span>${cat}</span> <span style="font-weight:bold; color:#D4AF37;">${catCount[cat]}</span></div>`;
                    }
                }
                if (otherCount > 0) {
                    catHtml += `<div class="category-badge"><span>Other (custom)</span> <span style="font-weight:bold; color:#D4AF37;">${otherCount}</span></div>`;
                }
                catHtml += '</div>';
                categoryStats.innerHTML = catHtml;

            } catch (err) {
                statsContainer.innerHTML = `<div class="no-products">Error: ${err.message}</div>`;
            }
        }

        // initial load for manage & stats (background)
        loadProducts();
        loadStatistics();

        // expose for debugging
        window.admin = { db, loadProducts, loadStatistics };
    </script>
</body>
</html>
